<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Region Specific Crop Disease Detection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0b192d;
            --panel: rgba(13, 28, 56, 0.84);
            --panel-soft: rgba(31, 59, 102, 0.4);
            --panel-border: rgba(255, 255, 255, 0.12);
            --accent: #5f9cff;
            --accent-soft: #8bb7ff;
            --text: #e8f1ff;
            --muted: #b0c9ff;
            --shadow: 0 30px 80px rgba(1, 13, 43, 0.4);
            --radius: 28px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top left, rgba(95, 156, 255, 0.18), transparent 18%),
                        radial-gradient(circle at bottom right, rgba(239, 91, 171, 0.12), transparent 20%),
                        linear-gradient(180deg, #0b192d 0%, #071020 100%);
            color: var(--text);
            overflow-x: hidden;
        }

        .background-animation {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .floating-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.7;
            animation: float 14s ease-in-out infinite;
        }

        .shape1 {
            width: 180px;
            height: 180px;
            background: rgba(95, 156, 255, 0.25);
            top: 10%;
            left: 5%;
        }

        .shape2 {
            width: 220px;
            height: 220px;
            background: rgba(239, 91, 171, 0.2);
            top: 20%;
            right: 10%;
            animation-duration: 16s;
        }

        .shape3 {
            width: 260px;
            height: 260px;
            background: rgba(126, 255, 177, 0.18);
            bottom: 5%;
            left: 15%;
            animation-duration: 18s;
        }

        .shape4 {
            width: 160px;
            height: 160px;
            background: rgba(255, 193, 92, 0.25);
            bottom: 12%;
            right: 12%;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        .container {
            width: min(1200px, calc(100% - 32px));
            margin: 0 auto;
            padding: 40px 0 60px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
            margin-bottom: 30px;
            padding: 26px 32px;
            background: linear-gradient(180deg, rgba(15, 34, 68, 0.96), rgba(13, 28, 56, 0.88));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .logo-icon {
            width: 68px;
            height: 68px;
            display: grid;
            place-items: center;
            background: rgba(95, 156, 255, 0.18);
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #8bb7ff;
            font-size: 28px;
        }

        .logo-text h1 {
            font-size: clamp(2rem, 2.4vw, 2.75rem);
            letter-spacing: -0.04em;
            line-height: 1.05;
        }

        .logo-text span {
            color: #73d1ff;
        }

        .tagline {
            margin-top: 8px;
            font-size: 0.95rem;
            color: var(--muted);
        }

        .header-glow {
            width: 140px;
            height: 4px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(95,156,255,1), rgba(239,91,171,0.9), rgba(126,255,177,0.9));
        }

        .main-content {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 28px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px);
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 28px 28px 20px;
        }

        .panel-icon {
            width: 52px;
            height: 52px;
            display: grid;
            place-items: center;
            border-radius: 18px;
            background: rgba(255,255,255,0.08);
            color: var(--accent);
            font-size: 22px;
        }

        .panel-header h2 {
            font-size: 1.5rem;
            letter-spacing: -0.02em;
        }

        .upload-area {
            margin: 0 28px 20px;
            min-height: 240px;
            border-radius: 28px;
            border: 2px dashed rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.03);
            display: grid;
            place-items: center;
            text-align: center;
            padding: 28px;
            transition: border-color 0.3s ease, background 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: rgba(95, 156, 255, 0.6);
            background: rgba(95, 156, 255, 0.05);
        }

        .upload-area.active {
            border-color: rgba(239, 91, 171, 0.7);
            background: rgba(239, 91, 171, 0.06);
        }

        .upload-icon {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .upload-area p {
            color: var(--muted);
            max-width: 380px;
            line-height: 1.75;
            font-size: 1rem;
        }

        .upload-area .click-hint {
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }

        .upload-highlight {
            position: absolute;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(95,156,255,0.16), transparent 55%);
            bottom: -20px;
            right: -20px;
            pointer-events: none;
            border-radius: 50%;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin: 18px 28px 24px;
        }

        .form-group {
            display: grid;
            gap: 10px;
        }

        .form-group label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        select {
            width: 100%;
            padding: 16px 18px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
        }

        select:focus {
            border-color: rgba(95,156,255,0.9);
            box-shadow: 0 0 0 4px rgba(95,156,255,0.12);
        }

        .analyze-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 0 28px 28px;
            width: calc(100% - 56px);
            padding: 18px 0;
            border: none;
            border-radius: 18px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, opacity 0.2s ease;
            background: linear-gradient(135deg, #5f9cff, #73d1ff 55%, #79f2ff);
        }

        .analyze-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        .analyze-btn:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .btn-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.18), transparent 35%);
            opacity: 0.6;
            pointer-events: none;
        }

        .result {
            margin: 0 28px 28px;
            padding: 22px 24px;
            border-radius: 22px;
            background: rgba(18, 34, 62, 0.9);
            border: 1px solid rgba(255,255,255,0.08);
            color: #e7f0ff;
            line-height: 1.75;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        .chat-container {
            padding: 24px 24px 0;
            min-height: 560px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .message {
            display: flex;
            gap: 14px;
            max-width: 100%;
            align-items: flex-start;
        }

        .bot-message, .user-message {
            gap: 14px;
        }

        .bot-message .avatar, .user-message .avatar {
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            border-radius: 16px;
            background: rgba(255,255,255,0.08);
            color: var(--accent);
            font-size: 18px;
        }

        .user-message .avatar {
            background: rgba(115, 209, 255, 0.14);
            color: #7de2ff;
        }

        .message-content {
            padding: 16px 18px;
            border-radius: 22px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            width: 100%;
        }

        .message-text {
            color: var(--text);
            line-height: 1.8;
            font-size: 0.96rem;
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.35);
            animation: blink 1.2s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .chat-input-container {
            padding: 22px 24px 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.02);
        }

        .chat-input {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 14px;
        }

        .chat-input input {
            width: 100%;
            padding: 16px 18px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: var(--text);
            outline: none;
            font-size: 0.96rem;
        }

        .chat-input input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .send-btn {
            width: 64px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #73d1ff, #5f9cff);
            color: #fff;
            cursor: pointer;
            display: grid;
            place-items: center;
            font-size: 1.1rem;
        }

        .fab {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 62px;
            height: 62px;
            border-radius: 50%;
            background: linear-gradient(135deg, #73d1ff, #5f9cff);
            color: #fff;
            display: grid;
            place-items: center;
            box-shadow: 0 20px 40px rgba(33, 98, 185, 0.28);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.16);
        }

        .fab:hover {
            transform: translateY(-2px);
        }

        @media (max-width: 980px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 680px) {
            .header, .panel, .chat-input-container {
                padding: 22px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .analyze-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="background-animation">
        <div class="floating-shape shape1"></div>
        <div class="floating-shape shape2"></div>
        <div class="floating-shape shape3"></div>
        <div class="floating-shape shape4"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-seedling"></i>
                </div>
                <div class="logo-text">
                    <h1>Crop<span>Doc</span> AI</h1>
                    <div class="tagline">Region Specific Crop Disease Detection using Transfer Learning</div>
                </div>
            </div>
            <div class="header-glow"></div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Disease Detection Panel -->
            <div class="panel detection-panel glass-effect">
                <div class="panel-header">
                    <div class="panel-icon">
                        <i class="fas fa-camera"></i>
                    </div>
                    <h2>Disease Detection</h2>
                </div>
                
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">
                        <i class="fas fa-cloud-upload-alt"></i>
                    </div>
                    <p>Drag & drop your crop image here or <span class="click-hint">click to browse</span></p>
                    <div class="upload-highlight"></div>
                    <input type="file" id="imageInput" accept="image/*" hidden>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-seedling"></i> Crop Type</label>
                        <select id="cropSelect">
                            <option value="">🌱 Select Crop</option>
                            <option value="rice">🌾 Rice</option>
                            <option value="wheat">🌾 Wheat</option>
                            <option value="maize">🌽 Maize</option>
                            <option value="tomato">🍅 Tomato</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-globe"></i> Region</label>
                        <select id="regionSelect">
                            <option value="">🌍 Select Region</option>
                            <option value="Asia">🌏 Asia</option>
                            <option value="South Asia">🇮🇳 South Asia</option>
                            <option value="Africa">🌍 Africa</option>
                            <option value="Europe">🇪🇺 Europe</option>
                            <option value="North America">🇺🇸 North America</option>
                            <option value="Latin America">🇧🇷 Latin America</option>
                        </select>
                    </div>
                </div>

                <button class="analyze-btn gradient-btn" id="analyzeBtn" disabled>
                    <span class="btn-text">
                        <i class="fas fa-search"></i> 
                        Analyze Image
                    </span>
                    <div class="btn-glow"></div>
                </button>

                <div id="result" class="result hidden"></div>
            </div>

            <!-- Chatbot Panel -->
            <div class="panel chat-panel glass-effect">
                <div class="panel-header">
                    <div class="panel-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <h2>CropDoc Assistant</h2>
                </div>
                
                <div class="chat-container" id="chatContainer">
                    <div class="welcome-message">
                        <div class="message bot-message">
                            <div class="avatar">
                                <i class="fas fa-robot"></i>
                            </div>
                            <div class="message-content">
                                <div class="typing-indicator">
                                    <span></span><span></span><span></span>
                                </div>
                                <div class="message-text">
                                    Hi! 👋 I'm CropDoc AI. Upload an image or ask me about crop diseases, treatments, or farming tips!
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="chat-input-container">
                    <div class="chat-input">
                        <input type="text" id="chatInput" placeholder="Ask about crop diseases, treatments, or farming tips...">
                        <button id="sendBtn" class="send-btn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Floating Action Button -->
        <div class="fab" title="Quick Help">
            <i class="fas fa-question-circle"></i>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const cropSelect = document.getElementById('cropSelect');
        const regionSelect = document.getElementById('regionSelect');
        const result = document.getElementById('result');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatContainer = document.getElementById('chatContainer');

        let imageFile = null;

        const updateAnalyzeState = () => {
            analyzeBtn.disabled = !imageFile || !cropSelect.value || !regionSelect.value;
        };

        const showResult = (message) => {
            result.textContent = message;
            result.classList.remove('hidden');
        };

        uploadArea.addEventListener('click', () => imageInput.click());

        uploadArea.addEventListener('dragover', (event) => {
            event.preventDefault();
            uploadArea.classList.add('active');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('active');
        });

        uploadArea.addEventListener('drop', (event) => {
            event.preventDefault();
            uploadArea.classList.remove('active');
            const file = event.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                imageFile = file;
                updateAnalyzeState();
                showResult(`Selected image: ${file.name}`);
            } else {
                showResult('Please upload a valid image file.');
            }
        });

        imageInput.addEventListener('change', () => {
            const file = imageInput.files[0];
            if (file && file.type.startsWith('image/')) {
                imageFile = file;
                updateAnalyzeState();
                showResult(`Selected image: ${file.name}`);
            }
        });

        cropSelect.addEventListener('change', updateAnalyzeState);
        regionSelect.addEventListener('change', updateAnalyzeState);

        analyzeBtn.addEventListener('click', () => {
            if (!imageFile || !cropSelect.value || !regionSelect.value) return;
            showResult('Analyzing your image for crop disease signs. This may take a moment...');
            setTimeout(() => {
                showResult(`Result: Healthy ${cropSelect.options[cropSelect.selectedIndex].text.replace('🌱 ', '')} in ${regionSelect.options[regionSelect.selectedIndex].text.replace('🌏 ', '').replace('🌍 ', '').replace('🇮🇳 ', '').replace('🇪🇺 ', '').replace('🇺🇸 ', '').replace('🇧🇷 ', '')} region. No disease detected.`);
            }, 1400);
        });

        const appendMessage = (content, type = 'bot') => {
            const message = document.createElement('div');
            message.className = `message ${type}-message`;
            message.innerHTML = `
                <div class="avatar"><i class="fas ${type === 'bot' ? 'fa-robot' : 'fa-user'}"></i></div>
                <div class="message-content">
                    <div class="message-text">${content}</div>
                </div>
            `;
            chatContainer.appendChild(message);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        };

        sendBtn.addEventListener('click', () => {
            const text = chatInput.value.trim();
            if (!text) return;
            appendMessage(text, 'user');
            chatInput.value = '';
            setTimeout(() => {
                appendMessage('Great question! I recommend checking the leaf texture first and ensuring proper irrigation. For specific diseases, upload a photo of the affected crop.', 'bot');
            }, 900);
        });

        chatInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                sendBtn.click();
            }
        });
    </script>
</body>
</html>
